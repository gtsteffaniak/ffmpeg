name: Fetch sources

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: fetch-sources-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fetch-sources:
    name: Validate fetch-sources.sh
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y bzip2 xz-utils

      - name: Fetch source packages
        run: make fetch-sources
