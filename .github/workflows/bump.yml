name: Automatic version updates

on:
  schedule:
    # minute hour dom month dow (UTC)
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  version_update:
    name: Update dependency versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Update source versions
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: make update

      - name: Remove backup file
        run: rm -f fetch-sources.sh.bak

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet fetch-sources.sh; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency updates found."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Dependency updates found:"
            git diff fetch-sources.sh
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT }}
          commit-message: 'chore(deps): update library versions'
          title: 'chore(deps): update library versions'
          body: |
            Automated dependency version updates from `helper.go`.

            Review version bumps in `fetch-sources.sh` before merging.
          branch: automated/version-bump
          delete-branch: true
